<header class="navbar">
  <div class="logo">JOSUE EMANUEL VARGUEZ MARIN</div>

  <nav class="nav-links">
    <a href="#inicio" class="active">Inicio</a>
    <a href="#sobre-mi">Sobre Mí</a>
    <a href="#servicios">Servicios</a>
    <a href="#portafolio">Portafolio</a>
    <a href="#contacto" class="contact-btn">Contacto</a>
  </nav>
</header>

<main>
  <!-- HERO -->
  <section id="inicio" class="hero">
    <div class="hero-overlay">
      <h1>Diseñador & Desarrollador Web.</h1>
      <div class="hero-line"></div>
      <p>Creando experiencias digitales a medida.</p>
      <a href="#contacto" class="hero-btn">Contáctame</a>
    </div>
  </section>

  <!-- CONTACTO -->
  <section id="contacto" class="section contact-section">
    <div class="section-header">
      <h2>CONTÁCTAME</h2>
      <div class="divider"></div>
      <p>Conéctate conmigo</p>
    </div>

    <div class="social-container">
      <a
        *ngFor="let social of socialLinks"
        [href]="social.url"
        target="_blank"
        rel="noopener noreferrer"
        class="social-icon"
        [ngClass]="social.className"
        [attr.aria-label]="social.name"
        [title]="social.name"
      >
        <i [class]="social.icon"></i>
      </a>
    </div>
  </section>

  <!-- PORTAFOLIO -->
  <section id="portafolio" class="section portfolio-section">
    <div class="section-header center">
      <h2>MIS PROYECTOS</h2>
      <div class="divider"></div>
      <p>Algunos de mis trabajos recientes</p>
    </div>

    <div class="tabs">
      <button
        class="tab-btn"
        [class.active]="activeTab === 'web'"
        (click)="changeTab('web')"
      >
        WEB
      </button>

      <button
        class="tab-btn"
        [class.active]="activeTab === 'mobile'"
        (click)="changeTab('mobile')"
      >
        MOBILE
      </button>
    </div>

    <div class="projects-grid">
      <article class="project-card" *ngFor="let project of filteredProjects">
        <div class="project-image">
          <img [src]="project.image" [alt]="project.title" />
        </div>
        <div class="project-info">
          <h3>{{ project.title }}</h3>
        </div>
      </article>
    </div>
  </section>
</main>
